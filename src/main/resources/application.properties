spring.application.name=hotelmanagement



spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lodging_restaurant_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Set this in your System Environment Variables as GROQ_API_KEY
# or replace ${GROQ_API_KEY:} with your actual key string for local testing.
groq.api.key=${GROQ_API_KEY:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8080